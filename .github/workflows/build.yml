name: Build and Publish Native GHC Wheel

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-wheels:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: manylinux2014_x86_64
            audit_tool: auditwheel
          - os: macos-latest
            platform: macosx_arm64
            audit_tool: delocate
          - os: windows-latest
            platform: win_amd64
            audit_tool: none
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System C-Linker (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc binutils patchelf
          wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo apt-get install -y ./libtinfo5_6.3-2ubuntu0.1_amd64.deb

      - name: Install System C-Linker (macOS)
        if: runner.os == 'macOS'
        run: xcode-select -p || xcode-select --install

      - name: Install System C-Linker (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install mingw -y
          echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Python Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build hatchling

      - name: Install Vendoring Tools (Linux)
        if: runner.os == 'Linux'
        run: pip install auditwheel

      - name: Install Vendoring Tools (macOS)
        if: runner.os == 'macOS'
        run: pip install delocate

      - name: Fetch and Verify GHC/Cabal Binaries
        shell: bash
        run: bash scripts/fetch_binaries.sh

      - name: Optimize Binary Size
        shell: bash
        run: bash scripts/optimize_binaries.sh

      - name: Patch GHC Paths for Relocatability
        shell: bash
        run: python scripts/patch_ghc_paths.py

      # FIX v2: New step — Fix macOS @rpath references before building
      - name: Fix macOS Dynamic Library Paths
        if: runner.os == 'macOS'
        shell: bash
        run: bash scripts/fix_macos_rpaths.sh

      - name: Build PEP 427 Python Wheel
        run: python -m build --wheel

      - name: Vendor Dynamic Libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          auditwheel repair dist/*.whl --plat manylinux2014_x86_64 -w wheelhouse/
          rm -rf dist/*
          mv wheelhouse/*.whl dist/

            - name: Vendor Dynamic Libraries (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "Running delocate-wheel to verify and bundle dependencies"
          # Our rpaths are already correctly pointing to the internal libs
          delocate-wheel -v dist/*.whl

      - name: End-to-End Compilation Validation
        shell: bash
        run: |
          python -m venv test-env
          if [[ "${OSTYPE}" == "msys" || "${OSTYPE}" == "win32" ]]; then
            source test-env/Scripts/activate
          else
            source test-env/bin/activate
          fi

          pip install dist/*.whl

          cat << 'EOF' > HelloWorld.hs
          module Main where
          main :: IO ()
          main = putStrLn "E2E Native Compiler Validation Successful."
          EOF

          ghc-wrapper HelloWorld.hs

          if [[ "${OSTYPE}" == "msys" || "${OSTYPE}" == "win32" ]]; then
            ./HelloWorld.exe
          else
            ./HelloWorld
          fi

          cabal-wrapper --version
          deactivate

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ghc-wheels-${{ matrix.platform }}
          path: dist/*.whl
          retention-days: 30

  publish-to-pypi:
    name: Zero-Trust PyPI Deployment via OIDC
    needs: build-wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/p/ghc-compiler-python

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/