name: Build and Publish Native GHC Wheel

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: manylinux2014_x86_64
            audit_tool: auditwheel
          - os: macos-latest
            platform: macosx_arm64
            audit_tool: delocate
          - os: windows-latest
            platform: win_amd64
            audit_tool: none
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install C-Linker (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc binutils patchelf

      - name: Install C-Linker (macOS)
        if: runner.os == 'macOS'
        run: xcode-select -p || xcode-select --install

      - name: Install C-Linker (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install mingw -y
          echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build hatchling

      - name: Install Vendoring Tools (Linux)
        if: runner.os == 'Linux'
        run: pip install auditwheel

      - name: Install Vendoring Tools (macOS)
        if: runner.os == 'macOS'
        run: pip install delocate

      - name: Fetch & Verify Binaries
        shell: bash
        run: bash scripts/fetch_binaries.sh

      - name: Optimize Binaries
        shell: bash
        run: bash scripts/optimize_binaries.sh

      - name: Patch GHC Paths
        shell: bash
        run: python scripts/patch_ghc_paths.py

      - name: Build Wheel
        run: python -m build --wheel

      - name: Vendor Libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          auditwheel repair dist/*.whl --plat manylinux2014_x86_64 -w wheelhouse/
          rm -rf dist/*
          mv wheelhouse/*.whl dist/

      - name: Vendor Libraries (macOS)
        if: runner.os == 'macOS'
        run: |
          # delocate needs to find the .dylib files
          # Point it to the lib directory where GHC libraries live
          DELOCATE_LIB_DIR="$(pwd)/ghc-bindist/lib"
          if [[ -d "${DELOCATE_LIB_DIR}" ]]; then
            delocate-wheel -v --libs-dir "${DELOCATE_LIB_DIR}" dist/*.whl
          else
            echo "WARNING: lib directory not found, running delocate-wheel without --libs-dir"
            delocate-wheel -v dist/*.whl || true
          fi

      - name: E2E Validation
        shell: bash
        run: |
          python -m venv test-env
          if [[ "${OSTYPE}" == "msys" || "${OSTYPE}" == "win32" ]]; then
            source test-env/Scripts/activate
          else
            source test-env/bin/activate
          fi
          pip install dist/*.whl

          cat << 'EOF' > HelloWorld.hs
          module Main where
          main :: IO ()
          main = putStrLn "E2E Validation Successful."
          EOF

          ghc-wrapper HelloWorld.hs
          if [[ "${OSTYPE}" == "msys" || "${OSTYPE}" == "win32" ]]; then
            ./HelloWorld.exe
          else
            ./HelloWorld
          fi

          cabal-wrapper --version
          echo ':quit' | ghci-wrapper -v0

          deactivate

      - uses: actions/upload-artifact@v4
        with:
          name: ghc-wheels-${{ matrix.platform }}
          path: dist/*.whl
          retention-days: 30

  publish-to-pypi:
    name: Zero-Trust PyPI Deployment via OIDC
    needs: build-wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/p/ghc-compiler-python

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
