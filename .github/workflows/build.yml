name: Build and Publish Native GHC Wheel

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-wheels:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: manylinux_2_39_x86_64
            audit_tool: auditwheel
          - os: macos-latest
            platform: macosx_arm64
            audit_tool: delocate
          - os: windows-latest
            platform: win_amd64
            audit_tool: none
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System C-Linker (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc binutils patchelf
          # GHC 9.4.8 needs libtinfo5/libncurses5 which aren't on Ubuntu 24.04 natively
          sudo apt-get install -y libtinfo5 libncurses5 libffi7 || \
            (sudo apt-get install -y libtinfo6 libncursesw6 libffi8 libgmp10 && \
             sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5 && \
             sudo ln -sf /usr/lib/x86_64-linux-gnu/libncursesw.so.6 /usr/lib/x86_64-linux-gnu/libncurses.so.5 && \
             sudo ln -sf /usr/lib/x86_64-linux-gnu/libffi.so.8 /usr/lib/x86_64-linux-gnu/libffi.so.7)

      - name: Install System C-Linker (macOS)
        if: runner.os == 'macOS'
        run: xcode-select -p || xcode-select --install

      - name: Install System C-Linker (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install mingw -y
          echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Python Build Dependencies
        run: |
          uv pip install --system build hatchling

      - name: Install Vendoring Tools (Linux)
        if: runner.os == 'Linux'
        run: uv pip install --system auditwheel

      - name: Install Vendoring Tools (macOS)
        if: runner.os == 'macOS'
        run: uv pip install --system delocate

      - name: Fetch and Verify GHC/Cabal Binaries
        shell: bash
        run: bash scripts/fetch_binaries.sh

      - name: Verify Shared Libraries
        shell: bash
        run: |
          echo "=== Checking for required .so files ==="
          find ghc-bindist -name "libtinfo*" -o -name "libncurses*" -o -name "libffi*" -o -name "libgmp*" || true
          echo "=== Full lib directory ==="
          ls -la ghc-bindist/lib/ghc-9.4.8/*.so* 2>/dev/null || true

          # Check if internal libraries actually extracted properly
          if [ -z "$(find ghc-bindist -name "libtinfo*.so.*")" ]; then
              echo "WARNING: libtinfo internal library not found in bindist, falling back to system symlinks."
          fi

      - name: Optimize Binary Size
        shell: bash
        run: bash scripts/optimize_binaries.sh

      - name: Patch GHC Paths for Relocatability
        shell: bash
        run: python scripts/patch_ghc_paths.py

      # FIX v2: New step — Fix macOS @rpath references before building
      - name: Fix macOS Dynamic Library Paths
        if: runner.os == 'macOS'
        shell: bash
        run: bash scripts/fix_macos_rpaths.sh

      - name: Build PEP 427 Python Wheel
        run: python -m build --wheel

      - name: Vendor Dynamic Libraries (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Find the exact directory where the nested .so files are located inside ghc-bindist/lib/
          LINUX_LIB_DIR=$(find ghc-bindist/lib -name "libHS*.so" | head -n 1 | xargs dirname)
          if [ -n "$LINUX_LIB_DIR" ]; then
              echo "Found Linux GHC libraries at $LINUX_LIB_DIR"
              export LD_LIBRARY_PATH="$(pwd)/$LINUX_LIB_DIR:${LD_LIBRARY_PATH:-}"
          else
              echo "WARNING: Could not find Linux GHC libraries directory."
          fi

          # Run auditwheel with the LD_LIBRARY_PATH so it can find the internal .so dependencies
          auditwheel repair dist/*.whl --plat manylinux_2_39_x86_64 -w wheelhouse/
          rm -rf dist/*
          mv wheelhouse/*.whl dist/

      - name: Vendor Dynamic Libraries (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "Running delocate-wheel to verify and bundle dependencies"
          # Our rpaths are already correctly pointing to the internal libs
          delocate-wheel -v dist/*.whl

      - name: End-to-End Compilation Validation
        shell: bash
        run: |
          uv venv test-env
          if [ -f test-env/Scripts/activate ]; then
            source test-env/Scripts/activate
          else
            source test-env/bin/activate
          fi

          uv pip install dist/*.whl
          echo "=== Debug Library Paths ==="
          find test-env -name "libtinfo*" -o -name "libncurses*" -o -name "libffi*" || true
          ls -la test-env/lib/ghc-9.4.8/bin || true
          ls -la test-env/ghc_compiler_python.libs || true

          cat << 'EOF' > HelloWorld.hs
          module Main where
          main :: IO ()
          main = putStrLn "E2E Native Compiler Validation Successful."
          EOF

          ghc-wrapper HelloWorld.hs

          if [ -f ./HelloWorld.exe ]; then
            ./HelloWorld.exe
          else
            ./HelloWorld
          fi

          cabal-wrapper --version
          deactivate

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ghc-wheels-${{ matrix.platform }}
          path: dist/*.whl
          retention-days: 30

  publish-to-pypi:
    name: Zero-Trust PyPI Deployment via OIDC
    needs: build-wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/p/ghc-compiler-python

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/